services:
  bot:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    env_file:
      - ../.env
    restart: unless-stopped
    volumes:
      - temp_media:/app/storage/temp
    healthcheck:
      test: ["CMD", "python", "deploy/healthcheck.py"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  temp_media:
