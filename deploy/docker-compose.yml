services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db

  bot:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    env_file:
      - ../.env
    depends_on:
      - mongo
    restart: unless-stopped
    volumes:
      - temp_media:/app/storage/temp
    healthcheck:
      test: ["CMD", "python", "deploy/healthcheck.py"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  mongo_data:
  temp_media:
